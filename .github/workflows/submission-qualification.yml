name: Submission Qualification

on:
  pull_request:
    branches:
      - main
    paths:
      - submission/**
      - scripts/tournament/**
      - .github/workflows/submission-qualification.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  qualify:
    runs-on: ubuntu-latest
    env:
      QUAL_BASELINE_PATH: python_skeleton
      QUAL_NUM_ROUNDS: "300"
      QUAL_MIN_BANKROLL: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install eval7 cython

      - name: Run Qualification Gatekeeper
        id: gatekeeper
        continue-on-error: true
        run: |
          python scripts/tournament/qualification_gatekeeper.py \
            --repo-root . \
            --base-ref "origin/${{ github.base_ref }}" \
            --baseline-path "${QUAL_BASELINE_PATH}" \
            --num-rounds "${QUAL_NUM_ROUNDS}" \
            --min-submission-bankroll "${QUAL_MIN_BANKROLL}" \
            --output-dir .qualification

      - name: Upload Qualification Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qualification-report
          path: .qualification

      - name: Comment PR with Qualification Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pokerbots-qualification-report -->';
            const summaryPath = '.qualification/summary.md';
            const body = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8')
              : `${marker}\n## PokerBots Qualification Report\n\nNo summary file was generated.`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce Qualification Result
        if: steps.gatekeeper.outcome != 'success'
        run: |
          echo "Qualification failed. Check PR comment and uploaded artifacts."
          exit 1
